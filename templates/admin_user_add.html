{% extends "base.html" %}
{% block content %}
<div class="header-row">
    <h2>Yeni Kişi Ekle</h2>
</div>

<div class="card">
    <form method="post" class="grid two-col" autocomplete="off">
        <label class="full">Daire Başkanlığı
            <select name="daire_baskanligi" required>
                {% for v in daire_options %}
                <option value="{{ v }}" {% if v == "Abone İşleri Dairesi Başkanlığı" %}selected{% endif %}>{{ v }}</option>
                {% endfor %}
            </select>
        </label>
        <label class="full">Şube Müdürlüğü
            <select name="sube_mudurlugu" required>
                {% for v in sube_options %}
                <option value="{{ v }}" {% if v == "Sayaç İşleri Şube Müdürlüğü" %}selected{% endif %}>{{ v }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Ad Soyad
            <input name="ad_soyad" value="">
        </label>
        <label>Sicil No
            <input name="sicil_no" value="">
        </label>
        <label>Ekip Kodu
            <input name="ekip_kodu" value="">
        </label>
        <label>E-posta
            <input type="email" name="email" value="" autocomplete="off" required>
        </label>
        <label>Şifre
            <input type="password" name="password" autocomplete="new-password" required>
        </label>
        <label>Şifre Tekrar
            <input type="password" name="password_confirm" autocomplete="new-password" required>
        </label>
        <div class="full edit-actions">
            <a class="button-link danger-link" href="{{ url_for('admin_users') }}">İptal</a>
            <button class="success-btn" type="submit">Kaydet</button>
        </div>
    </form>
</div>
{% endblock %}
