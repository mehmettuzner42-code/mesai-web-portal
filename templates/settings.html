{% extends "base.html" %}
{% block content %}
<div class="header-row">
    <h2>Ayarlar</h2>
</div>

<div class="card" id="apk-refresh">
    <h3>APK'dan Güncelle</h3>
    <p>Bu işlem web tarafındaki tüm kayıtları temizler. Sonra APK'de giriş/senkron yaptığınızda veriler tekrar web'e gelir.</p>
    <form method="post" onsubmit="return confirm('Web verileri temizlensin ve APK senkronuna hazırlansın mı?');">
        <input type="hidden" name="action" value="apk_refresh">
        <button type="submit">APK'dan Güncelle</button>
    </form>
</div>

<div class="card" id="clear-all">
    <h3>Tüm Verileri Sil</h3>
    <p>Bu işlem web tarafındaki tüm mesai ve profil bilgilerini siler.</p>
    <form method="post" onsubmit="return confirm('Web tarafındaki TÜM veriler silinsin mi?');">
        <input type="hidden" name="action" value="clear_all">
        <button type="submit" class="danger">Tüm Verileri Sil</button>
    </form>
</div>
{% endblock %}
