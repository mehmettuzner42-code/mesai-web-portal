{% extends "base.html" %}
{% block content %}
<div class="header-row">
    <h2>Excel İçe Aktar</h2>
    <a class="button-link" href="{{ url_for('admin_users') }}">Tüm Kişilere Dön</a>
</div>

<div class="card">
    <form method="post" enctype="multipart/form-data" class="grid">
        <label>İçe Aktar Dosya Seç (Excel)
            <input type="file" name="excel_file" accept=".xlsx,.xlsm,.xltx,.xltm" required>
        </label>
        <div class="admin-export-bar">
            <label>Yıl
                <select name="year" required>
                    {% for y in years %}
                    <option value="{{ y }}" {% if y == selected_year %}selected{% endif %}>{{ y }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Dönem
                <select name="period" required>
                    {% for sy, sm in period_options %}
                    {% set em = 1 if sm == 12 else sm + 1 %}
                    <option value="{{ '%02d'|format(sm) }}" {% if period_value.endswith('%02d'|format(sm)) %}selected{% endif %}>
                        {{ ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"][sm-1] }}/{{ ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"][em-1] }}
                    </option>
                    {% endfor %}
                </select>
            </label>
            <button type="submit" class="success-btn">İçe Aktar</button>
        </div>
        <p>
            Not: Sicil no C sütunundan, mesai işaretleri G..AK sütunundan okunur.
            P = Pazar, B = Bayram. P/B dışı sayılar ilgili güne göre %60 ve gerekiyorsa %15'e ayrılır.
        </p>
    </form>
</div>
{% endblock %}
