{% extends "base.html" %}
{% block content %}
<div class="card auth-card">
    <h2>Şifremi Unuttum</h2>
    <form method="post" class="grid">
        <label>E-posta
            <input type="email" name="email" required>
        </label>
        <button type="submit">Sıfırlama Bağlantısı Oluştur</button>
    </form>
    {% if reset_url %}
    <div class="alert success">
        SMTP ayarı yok/başarısız olduğu için geliştirme bağlantısı: <a href="{{ reset_url }}">{{ reset_url }}</a>
    </div>
    {% endif %}
    {% if sent_via_smtp %}
    <div class="alert success">Sıfırlama bağlantısı e-posta adresinize gönderildi.</div>
    {% endif %}
    <div class="links">
        <a href="{{ url_for('login') }}">Giriş ekranına dön</a>
    </div>
</div>
{% endblock %}
